<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Inicia sesión en el portal institucional de la UNEXCA para acceder a servicios académicos y administrativos.">
  <title>Iniciar Sesión — UNEXCA</title>
  <link rel="icon" href="/assets/img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/auth.css">
  <link rel="stylesheet" href="/assets/css/print.css" media="print">
</head>

<body>
  <div id="spinner" class="spinner" aria-hidden="true"></div>
  <div id="navbar-placeholder"></div>

  <main class="auth-pagina">
    <div class="container">
      <div class="auth-card">
        <img src="/assets/img/logo.png" alt="UNEXCA" class="auth-logo">
        <h1 class="auth-titulo">Iniciar Sesión</h1>
        <p class="auth-subtitulo">Accede al portal institucional</p>

        <div id="alerta-error" class="alerta alerta-error" style="display:none" role="alert"></div>

        <form id="form-login" novalidate>
          <div class="form-grupo">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" class="form-input" placeholder="correo@unexca.edu.ve" required
              autocomplete="email">
          </div>
          <div class="form-grupo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required
              autocomplete="current-password">
          </div>
          <button type="button" id="btn-login" class="btn btn-primario btn-full">Iniciar Sesión</button>
        </form>

        <a href="/pages/auth/recuperar-contrasena.html" class="auth-enlace">¿Olvidaste tu contraseña?</a>

        <hr class="auth-divisor">

        <a href="/pages/auth/registro.html" class="auth-enlace" style="font-weight:600">¿No tienes cuenta? Crear
          cuenta</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="/pages/auth/auth.js"></script>
</body>

</html>
