<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Recupera tu contraseña del portal institucional de la UNEXCA. Recibe un enlace de restablecimiento en tu correo electrónico.">
  <title>Recuperar Contraseña — UNEXCA</title>
  <link rel="icon" href="/assets/img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/auth.css">
  <link rel="stylesheet" href="/assets/css/print.css" media="print">
</head>

<body>
  <div id="spinner" class="spinner" aria-hidden="true"></div>
  <div id="navbar-placeholder"></div>

  <main class="auth-pagina">
    <div class="container">
      <div class="auth-card">
        <img src="/assets/img/logo.png" alt="UNEXCA" class="auth-logo">
        <h1 class="auth-titulo">Recuperar Contraseña</h1>
        <p class="auth-subtitulo">Te enviaremos un enlace para restablecer tu contraseña</p>

        <div id="alerta-error" class="alerta alerta-error" style="display:none" role="alert"></div>
        <div id="alerta-exito" class="alerta alerta-exito" style="display:none" role="alert"></div>

        <form id="form-recuperar" novalidate>
          <div class="form-grupo">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" class="form-input" placeholder="correo@unexca.edu.ve" required
              autocomplete="email">
          </div>
          <button type="button" id="btn-recuperar" class="btn btn-primario btn-full">Enviar enlace de
            recuperación</button>
        </form>

        <hr class="auth-divisor">

        <a href="/pages/auth/login.html" class="auth-enlace" style="font-weight:600">Volver a Iniciar Sesión</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="/pages/auth/auth.js"></script>
</body>

</html>
