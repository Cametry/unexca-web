<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Mantente informado con las noticias, anuncios, talleres, cursos y eventos de la UNEXCA.">
  <title>Noticias y Anuncios — UNEXCA</title>
  <link rel="icon" href="/assets/img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
</head>

<body>
  <div id="spinner" class="spinner" aria-hidden="true"></div>
  <div id="navbar-placeholder"></div>
  <main class="noticias-pagina">
    <section class="hero hero--wiki">
      <div class="container">
        <h1>Noticias y Anuncios</h1>
        <p>Mantente informado sobre todo lo que ocurre en la Universidad Nacional Experimental de la Gran Caracas.</p>
      </div>
    </section>
    <section class="seccion-inicio">
      <div class="container">
        <div id="alerta-error" class="alerta alerta-error" style="display:none" role="alert"></div>
        <div class="filtros-noticias">
          <button class="btn btn-sm filtro-categoria activo" data-categoria="null">Todos</button>
          <button class="btn btn-sm filtro-categoria" data-categoria="Noticia">Noticia</button>
          <button class="btn btn-sm filtro-categoria" data-categoria="Anuncio">Anuncio</button>
          <button class="btn btn-sm filtro-categoria" data-categoria="Taller">Taller</button>
          <button class="btn btn-sm filtro-categoria" data-categoria="Curso">Curso</button>
          <button class="btn btn-sm filtro-categoria" data-categoria="Evento">Evento</button>
        </div>
        <div id="noticias-grid" class="grid-tarjetas"></div>
        <div id="sin-resultados" class="vacio" style="display:none">
          <p>No hay noticias disponibles en esta categoría.</p>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
  <script type="module" src="noticias.js"></script>
</body>

</html>
