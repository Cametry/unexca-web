<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Editor de FAQ — UNEXCA">
  <title>FAQ — UNEXCA</title>
  <link rel="icon" href="/assets/img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>

<body>
  <div id="spinner" class="spinner" style="display:none;">
    <div class="spinner-circle"></div>
  </div>
  <div id="toast-contenedor"></div>

  <div id="navbar-placeholder"></div>

  <div class="admin-layout">
    <div class="admin-sidebar-overlay" id="admin-sidebar-overlay"></div>
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-logo">
        <img src="/assets/img/logo-unexca-white.png" alt="UNEXCA" height="40">
      </div>
      <nav>
        <ul class="admin-nav admin-sidebar-nav">
          <li><a href="/admin/"><span>📊</span> Dashboard</a></li>
          <li><a href="/admin/usuarios.html"><span>👥</span> Usuarios</a></li>
          <li><a href="/admin/wiki-editor.html"><span>📖</span> Wiki</a></li>
          <li><a href="/admin/faq-editor.html" class="activo"><span>❓</span> FAQ</a></li>
          <li><a href="/admin/noticias-editor.html"><span>📰</span> Noticias</a></li>
          <li><a href="/admin/documentos-editor.html"><span>📄</span> Documentos</a></li>
          <li><a href="/admin/calendario-editor.html"><span>📅</span> Calendario</a></li>
          <li><a href="/admin/configuracion.html"><span>⚙️</span> Configuración</a></li>
        </ul>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container">
        <div class="admin-header">
          <h1>Gestión de Preguntas Frecuentes</h1>
          <button class="btn btn-primario" id="btn-nueva-pregunta">+ Nueva Pregunta</button>
        </div>

        <div id="admin-mensaje" class="admin-mensaje"></div>

        <div class="editor-form" id="editor-form" style="display:none;">
          <h2 id="form-titulo">Crear Pregunta</h2>
          <input type="hidden" id="pregunta-id" value="">

          <div class="form-grupo">
            <label for="form-categoria">Categoría</label>
            <select id="form-categoria" class="form-input" required>
              <option value="">Seleccionar categoría...</option>
            </select>
          </div>

          <div class="form-grupo">
            <label for="form-pregunta">Pregunta</label>
            <input type="text" id="form-pregunta" class="form-input" required>
          </div>

          <div class="form-grupo">
            <label for="form-respuesta">Respuesta</label>
            <textarea id="form-respuesta" class="form-input" rows="6" required></textarea>
          </div>

          <div class="form-grupo">
            <label for="form-orden">Orden</label>
            <input type="number" id="form-orden" class="form-input" value="0" min="0">
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="form-publicado" checked>
            <label for="form-publicado">Publicar</label>
          </div>

          <div class="editor-acciones">
            <button class="btn btn-primario" id="btn-guardar">Guardar</button>
            <button class="btn btn-secundario" id="btn-cancelar">Cancelar</button>
          </div>
        </div>

        <div class="admin-tabla-wrapper">
          <table class="admin-tabla">
            <thead>
              <tr>
                <th>Pregunta</th>
                <th>Categoría</th>
                <th>Orden</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-preguntas"></tbody>
          </table>
        </div>
        <div id="paginacion-preguntas"></div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module">
    await requiereAutenticacion('personal');

    import { requiereAutenticacion, actualizarNavbar } from '/assets/js/auth.js';
    import { initAdmin } from '/admin/admin.js';
    import { sanitizar } from '/assets/js/utils.js';
    import { crearCRUD } from '/admin/crud-base.js';

    await initAdmin();

    const crud = crearCRUD({
      tabla: 'faq_preguntas',
      formId: 'editor-form',
      tablaId: 'tabla-preguntas',
      formTituloId: 'form-titulo',
      idInputId: 'pregunta-id',
      btnNuevoId: 'btn-nueva-pregunta',
      btnGuardarId: 'btn-guardar',
      btnCancelarId: 'btn-cancelar',
      mensajeId: 'admin-mensaje',
      paginacionId: 'paginacion-preguntas',
      limite: 20,
      selectQuery: '*, faq_categorias(nombre)',
      orderBy: { columna: 'creado_en', direccion: 'desc' },
      filtroPersonal: { columna: 'autor_id' },
      nombreSingular: 'pregunta',
      nombrePlural: 'preguntas',

      cargarSelects: async () => {
        const { supabase } = await import('/assets/js/supabase-client.js');
        const { data, error } = await supabase
          .from('faq_categorias')
          .select('id, nombre')
          .order('orden');
        if (error) throw error;
        const sel = document.getElementById('form-categoria');
        sel.innerHTML = '<option value="">Seleccionar categoría...</option>';
        if (data) {
          data.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat.id;
            opt.textContent = cat.nombre;
            sel.appendChild(opt);
          });
        }
      },

      obtenerDataForm: () => ({
        categoria_id: document.getElementById('form-categoria').value,
        pregunta: document.getElementById('form-pregunta').value.trim(),
        respuesta: document.getElementById('form-respuesta').value.trim(),
        orden: parseInt(document.getElementById('form-orden').value, 10) || 0,
        publicado: document.getElementById('form-publicado').checked
      }),

      rellenarForm: (data) => {
        document.getElementById('form-categoria').value = data.categoria_id || '';
        document.getElementById('form-pregunta').value = data.pregunta || '';
        document.getElementById('form-respuesta').value = data.respuesta || '';
        document.getElementById('form-orden').value = data.orden ?? 0;
        document.getElementById('form-publicado').checked = data.publicado ?? true;
      },

      limpiarForm: () => {
        document.getElementById('form-categoria').value = '';
        document.getElementById('form-pregunta').value = '';
        document.getElementById('form-respuesta').value = '';
        document.getElementById('form-orden').value = '0';
        document.getElementById('form-publicado').checked = true;
      },

      validarForm: (data) => {
        if (!data.categoria_id) return 'Debes seleccionar una categoría';
        if (!data.pregunta) return 'La pregunta es obligatoria';
        if (!data.respuesta) return 'La respuesta es obligatoria';
        return null;
      },

      plantillaFila: (p) => {
        const pregunta = sanitizar(p.pregunta.length > 60 ? p.pregunta.slice(0, 60) + '...' : p.pregunta);
        const categoria = p.faq_categorias?.nombre
          ? `<span class="badge badge-categoria">${sanitizar(p.faq_categorias.nombre)}</span>`
          : '—';
        const orden = p.orden ?? 0;
        const estado = p.publicado
          ? '<span class="badge badge-publicado">Publicado</span>'
          : '<span class="badge badge-borrador">Borrador</span>';
        return `<tr>
          <td>${pregunta}</td>
          <td>${categoria}</td>
          <td>${orden}</td>
          <td>${estado}</td>
          <td>
            <button class="btn btn-sm btn-primario btn-editar" data-id="${p.id}">Editar</button>
            <button class="btn btn-sm btn-peligro btn-eliminar" data-id="${p.id}">Eliminar</button>
          </td>
        </tr>`;
      }
    });

    await crud.init();
  </script>
</body>

</html>
