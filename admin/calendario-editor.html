<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Editor de Calendario — UNEXCA">
  <title>Calendario — UNEXCA</title>
  <link rel="icon" href="/assets/img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>

<body>
  <div id="spinner" class="spinner" style="display:none;">
    <div class="spinner-circle"></div>
  </div>
  <div id="toast-contenedor"></div>

  <div id="navbar-placeholder"></div>

  <div class="admin-layout">
    <div class="admin-sidebar-overlay" id="admin-sidebar-overlay"></div>
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-logo">
        <img src="/assets/img/logo-unexca-white.png" alt="UNEXCA" height="40">
      </div>
      <nav>
        <ul class="admin-nav admin-sidebar-nav">
          <li><a href="/admin/"><span>📊</span> Dashboard</a></li>
          <li><a href="/admin/usuarios.html"><span>👥</span> Usuarios</a></li>
          <li><a href="/admin/wiki-editor.html"><span>📖</span> Wiki</a></li>
          <li><a href="/admin/faq-editor.html"><span>❓</span> FAQ</a></li>
          <li><a href="/admin/noticias-editor.html"><span>📰</span> Noticias</a></li>
          <li><a href="/admin/documentos-editor.html"><span>📄</span> Documentos</a></li>
          <li><a href="/admin/calendario-editor.html" class="activo"><span>📅</span> Calendario</a></li>
          <li><a href="/admin/configuracion.html"><span>⚙️</span> Configuración</a></li>
        </ul>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container">
        <div class="admin-header">
          <h1>Gestión de Eventos</h1>
          <button class="btn btn-primario" id="btn-nuevo-evento">+ Nuevo Evento</button>
        </div>

        <div id="admin-mensaje" class="admin-mensaje"></div>

        <div class="editor-form" id="editor-form" style="display:none;">
          <h2 id="form-titulo">Crear Evento</h2>
          <input type="hidden" id="evento-id" value="">

          <div class="form-grupo">
            <label for="form-titulo-input">Título</label>
            <input type="text" id="form-titulo-input" class="form-input" required>
          </div>

          <div class="form-grupo">
            <label for="form-descripcion">Descripción</label>
            <textarea id="form-descripcion" class="form-input" rows="3" placeholder="Opcional"></textarea>
          </div>

          <div class="form-grupo">
            <label for="form-fecha-inicio">Fecha inicio</label>
            <input type="date" id="form-fecha-inicio" class="form-input" required>
          </div>

          <div class="form-grupo">
            <label for="form-fecha-fin">Fecha fin</label>
            <input type="date" id="form-fecha-fin" class="form-input" placeholder="Opcional">
          </div>

          <div class="form-grupo">
            <label for="form-tipo">Tipo</label>
            <select id="form-tipo" class="form-input" required>
              <option value="General">General</option>
              <option value="Inscripción">Inscripción</option>
              <option value="Clases">Clases</option>
              <option value="Examen">Examen</option>
              <option value="Graduación">Graduación</option>
              <option value="Feriado">Feriado</option>
            </select>
          </div>

          <div class="form-grupo">
            <label for="form-color">Color</label>
            <input type="color" id="form-color" class="form-input" value="#022A6F"
              style="height:40px;padding:2px;width:80px">
          </div>

          <div class="editor-acciones">
            <button class="btn btn-primario" id="btn-guardar">Guardar</button>
            <button class="btn btn-secundario" id="btn-cancelar">Cancelar</button>
          </div>
        </div>

        <div class="admin-tabla-wrapper">
          <table class="admin-tabla">
            <thead>
              <tr>
                <th>Título</th>
                <th>Tipo</th>
                <th>Fecha Inicio</th>
                <th>Fecha Fin</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-eventos"></tbody>
          </table>
        </div>
        <div id="paginacion-eventos"></div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module">
    await requiereAutenticacion('personal');

    import { requiereAutenticacion, actualizarNavbar } from '/assets/js/auth.js';
    import { initAdmin } from '/admin/admin.js';
    import { sanitizar } from '/assets/js/utils.js';
    import { crearCRUD } from '/admin/crud-base.js';

    await initAdmin();

    const crud = crearCRUD({
      tabla: 'calendario_eventos',
      formId: 'editor-form',
      tablaId: 'tabla-eventos',
      formTituloId: 'form-titulo',
      idInputId: 'evento-id',
      btnNuevoId: 'btn-nuevo-evento',
      btnGuardarId: 'btn-guardar',
      btnCancelarId: 'btn-cancelar',
      mensajeId: 'admin-mensaje',
      paginacionId: 'paginacion-eventos',
      limite: 20,
      selectQuery: '*',
      orderBy: { columna: 'fecha_inicio', direccion: 'desc' },
      filtroPersonal: { columna: 'creado_por' },
      nombreSingular: 'evento',
      nombrePlural: 'eventos',

      obtenerDataForm: () => ({
        titulo: document.getElementById('form-titulo-input').value.trim(),
        descripcion: document.getElementById('form-descripcion').value.trim(),
        fecha_inicio: document.getElementById('form-fecha-inicio').value,
        fecha_fin: document.getElementById('form-fecha-fin').value || null,
        tipo: document.getElementById('form-tipo').value,
        color: document.getElementById('form-color').value
      }),

      rellenarForm: (data) => {
        document.getElementById('form-titulo-input').value = data.titulo || '';
        document.getElementById('form-descripcion').value = data.descripcion || '';
        document.getElementById('form-fecha-inicio').value = data.fecha_inicio || '';
        document.getElementById('form-fecha-fin').value = data.fecha_fin || '';
        document.getElementById('form-tipo').value = data.tipo || 'General';
        document.getElementById('form-color').value = data.color || '#022A6F';
      },

      limpiarForm: () => {
        document.getElementById('form-titulo-input').value = '';
        document.getElementById('form-descripcion').value = '';
        document.getElementById('form-fecha-inicio').value = '';
        document.getElementById('form-fecha-fin').value = '';
        document.getElementById('form-tipo').value = 'General';
        document.getElementById('form-color').value = '#022A6F';
      },

      validarForm: (data) => {
        if (!data.titulo) return 'El título es obligatorio';
        if (!data.fecha_inicio) return 'La fecha de inicio es obligatoria';
        return null;
      },

      plantillaFila: (e) => {
        const titulo = sanitizar(e.titulo.length > 60 ? e.titulo.slice(0, 60) + '...' : e.titulo);
        const tipo = `<span class="badge badge-categoria">${sanitizar(e.tipo)}</span>`;
        const fechaInicio = e.fecha_inicio ? sanitizar(e.fecha_inicio) : '—';
        const fechaFin = e.fecha_fin ? sanitizar(e.fecha_fin) : '—';
        return `<tr>
          <td>${titulo}</td>
          <td>${tipo}</td>
          <td>${fechaInicio}</td>
          <td>${fechaFin}</td>
          <td>
            <button class="btn btn-sm btn-primario btn-editar" data-id="${e.id}">Editar</button>
            <button class="btn btn-sm btn-peligro btn-eliminar" data-id="${e.id}">Eliminar</button>
          </td>
        </tr>`;
      }
    });

    await crud.init();
  </script>
</body>

</html>
