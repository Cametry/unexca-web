<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Editor de Noticias — UNEXCA">
  <title>Noticias — UNEXCA</title>
  <link rel="icon" href="/assets/img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>

<body>
  <div id="spinner" class="spinner" style="display:none;">
    <div class="spinner-circle"></div>
  </div>

  <div id="navbar-placeholder"></div>

  <div class="admin-layout">
    <div class="admin-sidebar-overlay" id="admin-sidebar-overlay"></div>
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-logo">
        <img src="/assets/img/logo-unexca-white.png" alt="UNEXCA" height="40">
      </div>
      <nav>
        <ul class="admin-nav admin-sidebar-nav">
          <li><a href="/admin/"><span>📊</span> Dashboard</a></li>
          <li><a href="/admin/usuarios.html"><span>👥</span> Usuarios</a></li>
          <li><a href="/admin/wiki-editor.html"><span>📖</span> Wiki</a></li>
          <li><a href="/admin/faq-editor.html"><span>❓</span> FAQ</a></li>
          <li><a href="/admin/noticias-editor.html" class="activo"><span>📰</span> Noticias</a></li>
          <li><a href="/admin/documentos-editor.html"><span>📄</span> Documentos</a></li>
          <li><a href="/admin/calendario-editor.html"><span>📅</span> Calendario</a></li>
          <li><a href="/admin/configuracion.html"><span>⚙️</span> Configuración</a></li>
        </ul>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container">
        <div class="admin-header">
          <h1>Gestión de Noticias</h1>
          <button class="btn btn-primario" id="btn-nueva-noticia">+ Nueva Noticia</button>
        </div>

        <div id="admin-mensaje" class="admin-mensaje"></div>

        <div class="editor-form" id="editor-form" style="display:none;">
          <h2 id="form-titulo">Crear Noticia</h2>
          <input type="hidden" id="noticia-id" value="">

          <div class="form-grupo">
            <label for="form-titulo-input">Título</label>
            <input type="text" id="form-titulo-input" class="form-input" required>
          </div>

          <div class="form-grupo">
            <label for="form-resumen">Resumen</label>
            <textarea id="form-resumen" class="form-input" rows="3" placeholder="Descripción corta..."></textarea>
          </div>

          <div class="form-grupo">
            <label for="form-contenido">Contenido</label>
            <textarea id="form-contenido" class="form-input" rows="12" required></textarea>
          </div>

          <div class="form-grupo">
            <label for="form-categoria">Categoría</label>
            <select id="form-categoria" class="form-input" required>
              <option value="Noticia">Noticia</option>
              <option value="Anuncio">Anuncio</option>
              <option value="Taller">Taller</option>
              <option value="Curso">Curso</option>
              <option value="Evento">Evento</option>
            </select>
          </div>

          <div class="form-grupo">
            <label for="form-portada">URL Imagen Portada</label>
            <input type="text" id="form-portada" class="form-input" placeholder="https://... o URL de Supabase Storage">
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="form-publicado">
            <label for="form-publicado">Publicar</label>
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="form-destacado">
            <label for="form-destacado">Destacar en inicio</label>
          </div>

          <div class="editor-acciones">
            <button class="btn btn-primario" id="btn-guardar">Guardar</button>
            <button class="btn btn-secundario" id="btn-cancelar">Cancelar</button>
          </div>
        </div>

        <div class="admin-tabla-wrapper">
          <table class="admin-tabla">
            <thead>
              <tr>
                <th>Título</th>
                <th>Categoría</th>
                <th>Destacada</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-noticias"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module">
    await requiereAutenticacion('personal');

    import { requiereAutenticacion, getUsuarioActual, actualizarNavbar } from '/assets/js/auth.js';
    import { supabase } from '/assets/js/supabase-client.js';
    import { initAdmin } from '/admin/admin.js';
    import { formatearFecha, sanitizar } from '/assets/js/utils.js';

    await initAdmin();

    /* ─── State ─────────────────────────────────── */
    let modoEdicion = false;
    let noticiaEditandoId = null;

    /* ─── DOM references ────────────────────────── */
    const $ = (id) => document.getElementById(id);
    const editorForm = $('editor-form');
    const formTitulo = $('form-titulo');
    const noticiaId = $('noticia-id');
    const formTituloInput = $('form-titulo-input');
    const formResumen = $('form-resumen');
    const formContenido = $('form-contenido');
    const formCategoria = $('form-categoria');
    const formPortada = $('form-portada');
    const formPublicado = $('form-publicado');
    const formDestacado = $('form-destacado');
    const btnGuardar = $('btn-guardar');
    const btnCancelar = $('btn-cancelar');
    const btnNueva = $('btn-nueva-noticia');
    const tablaNoticias = $('tabla-noticias');
    const mensaje = $('admin-mensaje');

    /* ─── Message helper ────────────────────────── */
    function mostrarMensaje(texto, tipo) {
      mensaje.textContent = texto;
      mensaje.className = 'admin-mensaje ' + tipo;
      setTimeout(() => {
        mensaje.className = 'admin-mensaje';
        mensaje.textContent = '';
      }, 3000);
    }

    /* ─── Load news ─────────────────────────────── */
    async function cargarNoticias() {
      try {
        const { data, error } = await supabase
          .from('noticias')
          .select('*')
          .order('creado_en', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          tablaNoticias.innerHTML = '<tr><td colspan="6" class="empty-state">No hay noticias aún</td></tr>';
          return;
        }

        tablaNoticias.innerHTML = data.map(n => {
          const titulo = sanitizar(n.titulo.length > 60 ? n.titulo.slice(0, 60) + '...' : n.titulo);
          const categoria = `<span class="badge badge--${(n.categoria || '').toLowerCase()}">${sanitizar(n.categoria)}</span>`;
          const destacada = n.destacado ? '✓' : '✗';
          const estado = n.publicado
            ? '<span class="badge badge-publicado">Publicado</span>'
            : '<span class="badge badge-borrador">Borrador</span>';
          const fecha = formatearFecha(n.publicado_en || n.creado_en);
          return `<tr>
            <td>${titulo}</td>
            <td>${categoria}</td>
            <td>${destacada}</td>
            <td>${estado}</td>
            <td>${fecha}</td>
            <td>
              <button class="btn btn-sm btn-primario btn-editar" data-id="${n.id}">Editar</button>
              <button class="btn btn-sm btn-peligro btn-eliminar" data-id="${n.id}">Eliminar</button>
            </td>
          </tr>`;
        }).join('');
      } catch (err) {
        console.error('Error al cargar noticias:', err);
        tablaNoticias.innerHTML = '<tr><td colspan="6" class="empty-state error">Error al cargar los datos: ' + err.message + '</td></tr>';
      }
    }

    /* ─── Show / Hide form ──────────────────────── */
    function mostrarFormulario() {
      editorForm.style.display = 'block';
    }

    function ocultarFormulario() {
      editorForm.style.display = 'none';
      formTitulo.textContent = 'Crear Noticia';
      noticiaId.value = '';
      formTituloInput.value = '';
      formResumen.value = '';
      formContenido.value = '';
      formCategoria.value = 'Noticia';
      formPortada.value = '';
      formPublicado.checked = false;
      formDestacado.checked = false;
      modoEdicion = false;
      noticiaEditandoId = null;
    }

    /* ─── Nueva noticia ─────────────────────────── */
    btnNueva.addEventListener('click', () => {
      ocultarFormulario();
      modoEdicion = false;
      mostrarFormulario();
    });

    /* ─── Cancelar ──────────────────────────────── */
    btnCancelar.addEventListener('click', ocultarFormulario);

    /* ─── Editar (event delegation) ─────────────── */
    tablaNoticias.addEventListener('click', async (e) => {
      const btnEditar = e.target.closest('.btn-editar');
      if (!btnEditar) return;

      const id = btnEditar.dataset.id;
      try {
        const { data, error } = await supabase
          .from('noticias')
          .select('*')
          .eq('id', id)
          .single();

        if (error) throw error;
        if (!data) throw new Error('Noticia no encontrada');

        noticiaId.value = data.id;
        formTituloInput.value = data.titulo || '';
        formResumen.value = data.resumen || '';
        formContenido.value = data.contenido || '';
        formCategoria.value = data.categoria || 'Noticia';
        formPortada.value = data.portada_url || '';
        formPublicado.checked = data.publicado ?? false;
        formDestacado.checked = data.destacado ?? false;
        modoEdicion = true;
        noticiaEditandoId = data.id;
        formTitulo.textContent = 'Editar Noticia';
        mostrarFormulario();
      } catch (err) {
        console.error('Error al cargar noticia:', err);
        mostrarMensaje('Error al cargar la noticia: ' + err.message, 'error');
      }
    });

    /* ─── Guardar ───────────────────────────────── */
    btnGuardar.addEventListener('click', async () => {
      try {
        const titulo = formTituloInput.value.trim();
        const resumen = formResumen.value.trim();
        const contenido = formContenido.value.trim();
        const categoria = formCategoria.value;
        const portada_url = formPortada.value.trim();
        const publicado = formPublicado.checked;
        const destacado = formDestacado.checked;

        if (!titulo) {
          mostrarMensaje('El título es obligatorio', 'error');
          return;
        }
        if (!contenido) {
          mostrarMensaje('El contenido es obligatorio', 'error');
          return;
        }

        const { data: { user } } = await supabase.auth.getUser();

        if (!modoEdicion) {
          const { error } = await supabase
            .from('noticias')
            .insert({
              titulo,
              resumen,
              contenido,
              categoria,
              portada_url,
              publicado,
              destacado,
              autor_id: user.id
            })
            .select()
            .single();

          if (error) throw error;
          mostrarMensaje('Noticia creada exitosamente', 'exito');
        } else {
          const updateData = {
            titulo,
            resumen,
            contenido,
            categoria,
            portada_url,
            publicado,
            destacado
          };

          if (publicado && !noticiaEditandoId.publicado_en) {
            updateData.publicado_en = new Date().toISOString();
          }

          const { error } = await supabase
            .from('noticias')
            .update(updateData)
            .eq('id', noticiaEditandoId);

          if (error) throw error;
          mostrarMensaje('Noticia actualizada exitosamente', 'exito');
        }

        ocultarFormulario();
        await cargarNoticias();
      } catch (err) {
        console.error('Error al guardar noticia:', err);
        mostrarMensaje('Error al guardar la noticia: ' + err.message, 'error');
      }
    });

    /* ─── Eliminar (event delegation) ───────────── */
    tablaNoticias.addEventListener('click', async (e) => {
      const btnEliminar = e.target.closest('.btn-eliminar');
      if (!btnEliminar) return;

      const id = btnEliminar.dataset.id;
      if (!confirm('¿Seguro que deseas eliminar esta noticia?')) return;

      try {
        const { error } = await supabase
          .from('noticias')
          .delete()
          .eq('id', id);

        if (error) throw error;
        mostrarMensaje('Noticia eliminada exitosamente', 'exito');
        await cargarNoticias();
      } catch (err) {
        console.error('Error al eliminar noticia:', err);
        mostrarMensaje('Error al eliminar la noticia: ' + err.message, 'error');
      }
    });

    /* ─── Init ──────────────────────────────────── */
    await cargarNoticias();
  </script>
</body>

</html>
