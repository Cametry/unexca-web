<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Editor de Noticias — UNEXCA">
  <title>Noticias — UNEXCA</title>
  <link rel="icon" href="/assets/img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>

<body>
  <div id="spinner" class="spinner" style="display:none;">
    <div class="spinner-circle"></div>
  </div>
  <div id="toast-contenedor"></div>

  <div id="navbar-placeholder"></div>

  <div class="admin-layout">
    <div class="admin-sidebar-overlay" id="admin-sidebar-overlay"></div>
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-logo">
        <img src="/assets/img/logo-unexca-white.png" alt="UNEXCA" height="40">
      </div>
      <nav>
        <ul class="admin-nav admin-sidebar-nav">
          <li><a href="/admin/"><span>📊</span> Dashboard</a></li>
          <li><a href="/admin/usuarios.html"><span>👥</span> Usuarios</a></li>
          <li><a href="/admin/wiki-editor.html"><span>📖</span> Wiki</a></li>
          <li><a href="/admin/faq-editor.html"><span>❓</span> FAQ</a></li>
          <li><a href="/admin/noticias-editor.html" class="activo"><span>📰</span> Noticias</a></li>
          <li><a href="/admin/documentos-editor.html"><span>📄</span> Documentos</a></li>
          <li><a href="/admin/calendario-editor.html"><span>📅</span> Calendario</a></li>
          <li><a href="/admin/configuracion.html"><span>⚙️</span> Configuración</a></li>
        </ul>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container">
        <div class="admin-header">
          <h1>Gestión de Noticias</h1>
          <button class="btn btn-primario" id="btn-nueva-noticia">+ Nueva Noticia</button>
        </div>

        <div id="admin-mensaje" class="admin-mensaje"></div>

        <div class="editor-form" id="editor-form" style="display:none;">
          <h2 id="form-titulo">Crear Noticia</h2>
          <input type="hidden" id="noticia-id" value="">

          <div class="form-grupo">
            <label for="form-titulo-input">Título</label>
            <input type="text" id="form-titulo-input" class="form-input" required>
          </div>

          <div class="form-grupo">
            <label for="form-resumen">Resumen</label>
            <textarea id="form-resumen" class="form-input" rows="3" placeholder="Descripción corta..."></textarea>
          </div>

          <div class="form-grupo">
            <label for="form-contenido">Contenido</label>
            <textarea id="form-contenido" class="form-input" rows="12" required></textarea>
          </div>

          <div class="form-grupo">
            <label for="form-categoria">Categoría</label>
            <select id="form-categoria" class="form-input" required>
              <option value="Noticia">Noticia</option>
              <option value="Anuncio">Anuncio</option>
              <option value="Taller">Taller</option>
              <option value="Curso">Curso</option>
              <option value="Evento">Evento</option>
            </select>
          </div>

          <div class="form-grupo">
            <label for="form-portada">URL Imagen Portada</label>
            <input type="text" id="form-portada" class="form-input" placeholder="https://... o URL de Supabase Storage">
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="form-publicado">
            <label for="form-publicado">Publicar</label>
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="form-destacado">
            <label for="form-destacado">Destacar en inicio</label>
          </div>

          <div class="editor-acciones">
            <button class="btn btn-primario" id="btn-guardar">Guardar</button>
            <button class="btn btn-secundario" id="btn-cancelar">Cancelar</button>
          </div>
        </div>

        <div class="admin-tabla-wrapper">
          <table class="admin-tabla">
            <thead>
              <tr>
                <th>Título</th>
                <th>Categoría</th>
                <th>Destacada</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-noticias"></tbody>
          </table>
        </div>
        <div id="paginacion-noticias"></div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module">
    await requiereAutenticacion('personal');

    import { requiereAutenticacion, actualizarNavbar } from '/assets/js/auth.js';
    import { initAdmin } from '/admin/admin.js';
    import { formatearFecha, sanitizar } from '/assets/js/utils.js';
    import { crearCRUD } from '/admin/crud-base.js';

    await initAdmin();

    const crud = crearCRUD({
      tabla: 'noticias',
      formId: 'editor-form',
      tablaId: 'tabla-noticias',
      formTituloId: 'form-titulo',
      idInputId: 'noticia-id',
      btnNuevoId: 'btn-nueva-noticia',
      btnGuardarId: 'btn-guardar',
      btnCancelarId: 'btn-cancelar',
      mensajeId: 'admin-mensaje',
      paginacionId: 'paginacion-noticias',
      limite: 20,
      selectQuery: '*',
      orderBy: { columna: 'creado_en', direccion: 'desc' },
      filtroPersonal: { columna: 'autor_id' },
      nombreSingular: 'noticia',
      nombrePlural: 'noticias',

      obtenerDataForm: () => ({
        titulo: document.getElementById('form-titulo-input').value.trim(),
        resumen: document.getElementById('form-resumen').value.trim(),
        contenido: document.getElementById('form-contenido').value.trim(),
        categoria: document.getElementById('form-categoria').value,
        portada_url: document.getElementById('form-portada').value.trim(),
        publicado: document.getElementById('form-publicado').checked,
        destacado: document.getElementById('form-destacado').checked
      }),

      rellenarForm: (data) => {
        document.getElementById('form-titulo-input').value = data.titulo || '';
        document.getElementById('form-resumen').value = data.resumen || '';
        document.getElementById('form-contenido').value = data.contenido || '';
        document.getElementById('form-categoria').value = data.categoria || 'Noticia';
        document.getElementById('form-portada').value = data.portada_url || '';
        document.getElementById('form-publicado').checked = data.publicado ?? false;
        document.getElementById('form-destacado').checked = data.destacado ?? false;
      },

      limpiarForm: () => {
        document.getElementById('form-titulo-input').value = '';
        document.getElementById('form-resumen').value = '';
        document.getElementById('form-contenido').value = '';
        document.getElementById('form-categoria').value = 'Noticia';
        document.getElementById('form-portada').value = '';
        document.getElementById('form-publicado').checked = false;
        document.getElementById('form-destacado').checked = false;
      },

      validarForm: (data) => {
        if (!data.titulo) return 'El título es obligatorio';
        if (!data.contenido) return 'El contenido es obligatorio';
        return null;
      },

      updateExtra: (data) => {
        // Si se publica y no tenía fecha, asignarla
        if (data.publicado && !data.publicado_en) {
          return { publicado_en: new Date().toISOString() };
        }
        return {};
      },

      plantillaFila: (n) => {
        const titulo = sanitizar(n.titulo.length > 60 ? n.titulo.slice(0, 60) + '...' : n.titulo);
        const categoria = `<span class="badge badge--${(n.categoria || '').toLowerCase()}">${sanitizar(n.categoria)}</span>`;
        const destacada = n.destacado ? '✓' : '✗';
        const estado = n.publicado
          ? '<span class="badge badge-publicado">Publicado</span>'
          : '<span class="badge badge-borrador">Borrador</span>';
        const fecha = formatearFecha(n.publicado_en || n.creado_en);
        return `<tr>
          <td>${titulo}</td>
          <td>${categoria}</td>
          <td>${destacada}</td>
          <td>${estado}</td>
          <td>${fecha}</td>
          <td>
            <button class="btn btn-sm btn-primario btn-editar" data-id="${n.id}">Editar</button>
            <button class="btn btn-sm btn-peligro btn-eliminar" data-id="${n.id}">Eliminar</button>
          </td>
        </tr>`;
      }
    });

    await crud.init();
  </script>
</body>

</html>
