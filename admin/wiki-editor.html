<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Editor de Wiki — UNEXCA">
  <title>Wiki — UNEXCA</title>
  <link rel="icon" href="/assets/img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>

<body>
  <div id="spinner" class="spinner" style="display:none;">
    <div class="spinner-circle"></div>
  </div>
  <div id="toast-contenedor"></div>

  <div id="navbar-placeholder"></div>

  <div class="admin-layout">
    <div class="admin-sidebar-overlay" id="admin-sidebar-overlay"></div>
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-logo">
        <img src="/assets/img/logo-unexca-white.png" alt="UNEXCA" height="40">
      </div>
      <nav>
        <ul class="admin-nav admin-sidebar-nav">
          <li><a href="/admin/"><span>📊</span> Dashboard</a></li>
          <li><a href="/admin/usuarios.html"><span>👥</span> Usuarios</a></li>
          <li><a href="/admin/wiki-editor.html" class="activo"><span>📖</span> Wiki</a></li>
          <li><a href="/admin/faq-editor.html"><span>❓</span> FAQ</a></li>
          <li><a href="/admin/noticias-editor.html"><span>📰</span> Noticias</a></li>
          <li><a href="/admin/documentos-editor.html"><span>📄</span> Documentos</a></li>
          <li><a href="/admin/calendario-editor.html"><span>📅</span> Calendario</a></li>
          <li><a href="/admin/configuracion.html"><span>⚙️</span> Configuración</a></li>
        </ul>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container">
        <div class="admin-header">
          <h1>Gestión de Artículos Wiki</h1>
          <button class="btn btn-primario" id="btn-nuevo-articulo">+ Nuevo Artículo</button>
        </div>

        <div id="admin-mensaje" class="admin-mensaje"></div>

        <div class="editor-form" id="editor-form" style="display:none;">
          <h2 id="form-titulo">Crear Artículo</h2>
          <input type="hidden" id="articulo-id" value="">

          <div class="form-grupo">
            <label for="form-categoria">Categoría</label>
            <select id="form-categoria" class="form-input" required>
              <option value="">Seleccionar categoría...</option>
            </select>
          </div>

          <div class="form-grupo">
            <label for="form-titulo-input">Título</label>
            <input type="text" id="form-titulo-input" class="form-input" required>
          </div>

          <div class="form-grupo">
            <label for="form-contenido">Contenido</label>
            <textarea id="form-contenido" class="form-input" rows="12" required></textarea>
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="form-publicado">
            <label for="form-publicado">Publicar artículo</label>
          </div>

          <div class="editor-acciones">
            <button class="btn btn-primario" id="btn-guardar">Guardar</button>
            <button class="btn btn-secundario" id="btn-cancelar">Cancelar</button>
          </div>
        </div>

        <div class="admin-tabla-wrapper">
          <table class="admin-tabla">
            <thead>
              <tr>
                <th>Título</th>
                <th>Categoría</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-articulos"></tbody>
          </table>
        </div>
        <div id="paginacion-articulos"></div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module">
    await requiereAutenticacion('personal');

    import { requiereAutenticacion, actualizarNavbar } from '/assets/js/auth.js';
    import { supabase } from '/assets/js/supabase-client.js';
    import { initAdmin } from '/admin/admin.js';
    import { formatearFecha, sanitizar } from '/assets/js/utils.js';
    import { crearCRUD } from '/admin/crud-base.js';

    await initAdmin();

    /* ─── Cargar categorías (lógica específica) ── */
    async function cargarCategorias() {
      const { data, error } = await supabase
        .from('wiki_categorias')
        .select('id, nombre')
        .order('orden');
      if (error) throw error;
      const sel = document.getElementById('form-categoria');
      sel.innerHTML = '<option value="">Seleccionar categoría...</option>';
      if (data) {
        data.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat.id;
          opt.textContent = cat.nombre;
          sel.appendChild(opt);
        });
      }
    }

    /* ─── CRUD base ─────────────────────────────── */
    const crud = crearCRUD({
      tabla: 'wiki_articulos',
      formId: 'editor-form',
      tablaId: 'tabla-articulos',
      formTituloId: 'form-titulo',
      idInputId: 'articulo-id',
      btnNuevoId: 'btn-nuevo-articulo',
      btnGuardarId: 'btn-guardar',
      btnCancelarId: 'btn-cancelar',
      mensajeId: 'admin-mensaje',
      paginacionId: 'paginacion-articulos',
      limite: 20,
      selectQuery: '*, wiki_categorias(nombre)',
      orderBy: { columna: 'creado_en', direccion: 'desc' },
      filtroPersonal: { columna: 'autor_id' },
      nombreSingular: 'artículo',
      nombrePlural: 'artículos',

      cargarSelects: async () => {
        await cargarCategorias();
      },

      obtenerDataForm: () => ({
        categoria_id: document.getElementById('form-categoria').value,
        titulo: document.getElementById('form-titulo-input').value.trim(),
        contenido: document.getElementById('form-contenido').value.trim(),
        publicado: document.getElementById('form-publicado').checked
      }),

      rellenarForm: (data) => {
        document.getElementById('form-categoria').value = data.categoria_id || '';
        document.getElementById('form-titulo-input').value = data.titulo || '';
        document.getElementById('form-contenido').value = data.contenido || '';
        document.getElementById('form-publicado').checked = data.publicado || false;
      },

      limpiarForm: () => {
        document.getElementById('form-categoria').value = '';
        document.getElementById('form-titulo-input').value = '';
        document.getElementById('form-contenido').value = '';
        document.getElementById('form-publicado').checked = false;
      },

      validarForm: (data) => {
        if (!data.categoria_id) return 'Debes seleccionar una categoría';
        if (!data.titulo) return 'El título es obligatorio';
        return null;
      },

      plantillaFila: (a) => {
        const titulo = sanitizar(a.titulo);
        const categoria = a.wiki_categorias?.nombre
          ? `<span class="badge badge-categoria">${sanitizar(a.wiki_categorias.nombre)}</span>`
          : '—';
        const estado = a.publicado
          ? '<span class="badge badge-publicado">Publicado</span>'
          : '<span class="badge badge-borrador">Borrador</span>';
        const fecha = formatearFecha(a.creado_en);
        return `<tr>
          <td>${titulo}</td>
          <td>${categoria}</td>
          <td>${estado}</td>
          <td>${fecha}</td>
          <td>
            <button class="btn btn-sm btn-primario btn-editar" data-id="${a.id}">Editar</button>
            <button class="btn btn-sm btn-peligro btn-eliminar" data-id="${a.id}">Eliminar</button>
          </td>
        </tr>`;
      }
    });

    await crud.init();
  </script>
</body>

</html>
