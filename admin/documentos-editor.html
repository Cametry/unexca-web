<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Editor de Documentos — UNEXCA">
  <title>Documentos — UNEXCA</title>
  <link rel="icon" href="/assets/img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>

<body>
  <div id="spinner" class="spinner" style="display:none;">
    <div class="spinner-circle"></div>
  </div>
  <div id="toast-contenedor"></div>

  <div id="navbar-placeholder"></div>

  <div class="admin-layout">
    <div class="admin-sidebar-overlay" id="admin-sidebar-overlay"></div>
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-logo">
        <img src="/assets/img/logo-unexca-white.png" alt="UNEXCA" height="40">
      </div>
      <nav>
        <ul class="admin-nav admin-sidebar-nav">
          <li><a href="/admin/"><span>📊</span> Dashboard</a></li>
          <li><a href="/admin/usuarios.html"><span>👥</span> Usuarios</a></li>
          <li><a href="/admin/wiki-editor.html"><span>📖</span> Wiki</a></li>
          <li><a href="/admin/faq-editor.html"><span>❓</span> FAQ</a></li>
          <li><a href="/admin/noticias-editor.html"><span>📰</span> Noticias</a></li>
          <li><a href="/admin/documentos-editor.html" class="activo"><span>📄</span> Documentos</a></li>
          <li><a href="/admin/calendario-editor.html"><span>📅</span> Calendario</a></li>
          <li><a href="/admin/configuracion.html"><span>⚙️</span> Configuración</a></li>
        </ul>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container">
        <div class="admin-header">
          <h1>Gestión de Documentos</h1>
          <button class="btn btn-primario" id="btn-nuevo-documento">+ Nuevo Documento</button>
        </div>

        <div id="admin-mensaje" class="admin-mensaje"></div>

        <div class="editor-form" id="editor-form" style="display:none;">
          <h2 id="form-titulo">Crear Documento</h2>
          <input type="hidden" id="documento-id" value="">

          <div class="form-grupo">
            <label for="form-titulo-input">Título</label>
            <input type="text" id="form-titulo-input" class="form-input" required>
          </div>

          <div class="form-grupo">
            <label for="form-descripcion">Descripción</label>
            <textarea id="form-descripcion" class="form-input" rows="3"></textarea>
          </div>

          <div class="form-grupo">
            <label for="form-archivo-url">URL del archivo PDF</label>
            <input type="text" id="form-archivo-url" class="form-input"
              placeholder="https://... o URL de Supabase Storage" required>
          </div>

          <div class="form-grupo">
            <label for="form-categoria">Categoría</label>
            <input type="text" id="form-categoria" class="form-input" placeholder="Ej: Reglamentos, Planes de Estudio"
              required>
          </div>

          <div class="form-grupo">
            <label for="form-carrera">Carrera</label>
            <input type="text" id="form-carrera" class="form-input" placeholder="Opcional">
          </div>

          <div class="form-grupo">
            <label for="form-acceso">Acceso mínimo</label>
            <select id="form-acceso" class="form-input" required>
              <option value="publico">Público</option>
              <option value="estudiante" selected>Estudiante</option>
              <option value="personal">Personal</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="editor-acciones">
            <button class="btn btn-primario" id="btn-guardar">Guardar</button>
            <button class="btn btn-secundario" id="btn-cancelar">Cancelar</button>
          </div>
        </div>

        <div class="admin-tabla-wrapper">
          <table class="admin-tabla">
            <thead>
              <tr>
                <th>Título</th>
                <th>Categoría</th>
                <th>Carrera</th>
                <th>Acceso</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-documentos"></tbody>
          </table>
        </div>
        <div id="paginacion-documentos"></div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module">
    await requiereAutenticacion('personal');

    import { requiereAutenticacion, actualizarNavbar } from '/assets/js/auth.js';
    import { initAdmin } from '/admin/admin.js';
    import { sanitizar } from '/assets/js/utils.js';
    import { crearCRUD } from '/admin/crud-base.js';

    await initAdmin();

    const crud = crearCRUD({
      tabla: 'documentos',
      formId: 'editor-form',
      tablaId: 'tabla-documentos',
      formTituloId: 'form-titulo',
      idInputId: 'documento-id',
      btnNuevoId: 'btn-nuevo-documento',
      btnGuardarId: 'btn-guardar',
      btnCancelarId: 'btn-cancelar',
      mensajeId: 'admin-mensaje',
      paginacionId: 'paginacion-documentos',
      limite: 20,
      selectQuery: '*',
      orderBy: { columna: 'creado_en', direccion: 'desc' },
      filtroPersonal: { columna: 'subido_por' },
      nombreSingular: 'documento',
      nombrePlural: 'documentos',

      obtenerDataForm: () => ({
        titulo: document.getElementById('form-titulo-input').value.trim(),
        descripcion: document.getElementById('form-descripcion').value.trim(),
        archivo_url: document.getElementById('form-archivo-url').value.trim(),
        categoria: document.getElementById('form-categoria').value.trim(),
        carrera: document.getElementById('form-carrera').value.trim(),
        acceso_minimo: document.getElementById('form-acceso').value
      }),

      rellenarForm: (data) => {
        document.getElementById('form-titulo-input').value = data.titulo || '';
        document.getElementById('form-descripcion').value = data.descripcion || '';
        document.getElementById('form-archivo-url').value = data.archivo_url || '';
        document.getElementById('form-categoria').value = data.categoria || '';
        document.getElementById('form-carrera').value = data.carrera || '';
        document.getElementById('form-acceso').value = data.acceso_minimo || 'estudiante';
      },

      limpiarForm: () => {
        document.getElementById('form-titulo-input').value = '';
        document.getElementById('form-descripcion').value = '';
        document.getElementById('form-archivo-url').value = '';
        document.getElementById('form-categoria').value = '';
        document.getElementById('form-carrera').value = '';
        document.getElementById('form-acceso').value = 'estudiante';
      },

      validarForm: (data) => {
        if (!data.titulo) return 'El título es obligatorio';
        if (!data.archivo_url) return 'La URL del archivo es obligatoria';
        if (!data.categoria) return 'La categoría es obligatoria';
        return null;
      },

      plantillaFila: (d) => {
        const titulo = sanitizar(d.titulo.length > 60 ? d.titulo.slice(0, 60) + '...' : d.titulo);
        const categoria = `<span class="badge badge-categoria">${sanitizar(d.categoria)}</span>`;
        const carrera = d.carrera ? sanitizar(d.carrera) : '—';
        const badgeAcceso = {
          publico: '<span class="badge badge-publicado">Público</span>',
          estudiante: '<span class="badge badge-activo">Estudiante</span>',
          personal: '<span class="badge badge-advertencia">Personal</span>',
          admin: '<span class="badge badge-inactivo">Admin</span>'
        }[d.acceso_minimo] || sanitizar(d.acceso_minimo);
        return `<tr>
          <td>${titulo}</td>
          <td>${categoria}</td>
          <td>${carrera}</td>
          <td>${badgeAcceso}</td>
          <td>
            <button class="btn btn-sm btn-primario btn-editar" data-id="${d.id}">Editar</button>
            <button class="btn btn-sm btn-peligro btn-eliminar" data-id="${d.id}">Eliminar</button>
          </td>
        </tr>`;
      }
    });

    await crud.init();
  </script>
</body>

</html>
