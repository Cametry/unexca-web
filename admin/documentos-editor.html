<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Editor de Documentos — UNEXCA">
  <title>Documentos — UNEXCA</title>
  <link rel="icon" href="/assets/img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>

<body>
  <div id="spinner" class="spinner" style="display:none;">
    <div class="spinner-circle"></div>
  </div>

  <div id="navbar-placeholder"></div>

  <div class="admin-layout">
    <div class="admin-sidebar-overlay" id="admin-sidebar-overlay"></div>
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-logo">
        <img src="/assets/img/logo-unexca-white.png" alt="UNEXCA" height="40">
      </div>
      <nav>
        <ul class="admin-nav admin-sidebar-nav">
          <li><a href="/admin/"><span>📊</span> Dashboard</a></li>
          <li><a href="/admin/usuarios.html"><span>👥</span> Usuarios</a></li>
          <li><a href="/admin/wiki-editor.html"><span>📖</span> Wiki</a></li>
          <li><a href="/admin/faq-editor.html"><span>❓</span> FAQ</a></li>
          <li><a href="/admin/noticias-editor.html"><span>📰</span> Noticias</a></li>
          <li><a href="/admin/documentos-editor.html" class="activo"><span>📄</span> Documentos</a></li>
          <li><a href="/admin/calendario-editor.html"><span>📅</span> Calendario</a></li>
          <li><a href="/admin/configuracion.html"><span>⚙️</span> Configuración</a></li>
        </ul>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container">
        <div class="admin-header">
          <h1>Gestión de Documentos</h1>
          <button class="btn btn-primario" id="btn-nuevo-documento">+ Nuevo Documento</button>
        </div>

        <div id="admin-mensaje" class="admin-mensaje"></div>

        <div class="editor-form" id="editor-form" style="display:none;">
          <h2 id="form-titulo">Crear Documento</h2>
          <input type="hidden" id="documento-id" value="">

          <div class="form-grupo">
            <label for="form-titulo-input">Título</label>
            <input type="text" id="form-titulo-input" class="form-input" required>
          </div>

          <div class="form-grupo">
            <label for="form-descripcion">Descripción</label>
            <textarea id="form-descripcion" class="form-input" rows="3"></textarea>
          </div>

          <div class="form-grupo">
            <label for="form-archivo-url">URL del archivo PDF</label>
            <input type="text" id="form-archivo-url" class="form-input"
              placeholder="https://... o URL de Supabase Storage" required>
          </div>

          <div class="form-grupo">
            <label for="form-categoria">Categoría</label>
            <input type="text" id="form-categoria" class="form-input" placeholder="Ej: Reglamentos, Planes de Estudio"
              required>
          </div>

          <div class="form-grupo">
            <label for="form-carrera">Carrera</label>
            <input type="text" id="form-carrera" class="form-input" placeholder="Opcional">
          </div>

          <div class="form-grupo">
            <label for="form-acceso">Acceso mínimo</label>
            <select id="form-acceso" class="form-input" required>
              <option value="publico">Público</option>
              <option value="estudiante" selected>Estudiante</option>
              <option value="personal">Personal</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="editor-acciones">
            <button class="btn btn-primario" id="btn-guardar">Guardar</button>
            <button class="btn btn-secundario" id="btn-cancelar">Cancelar</button>
          </div>
        </div>

        <div class="admin-tabla-wrapper">
          <table class="admin-tabla">
            <thead>
              <tr>
                <th>Título</th>
                <th>Categoría</th>
                <th>Carrera</th>
                <th>Acceso</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-documentos"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module">
    await requiereAutenticacion('personal');

    import { requiereAutenticacion, getUsuarioActual, actualizarNavbar } from '/assets/js/auth.js';
    import { supabase } from '/assets/js/supabase-client.js';
    import { initAdmin } from '/admin/admin.js';
    import { sanitizar } from '/assets/js/utils.js';

    await initAdmin();

    /* ─── State ─────────────────────────────────── */
    let modoEdicion = false;
    let documentoEditandoId = null;

    /* ─── DOM references ────────────────────────── */
    const $ = (id) => document.getElementById(id);
    const editorForm = $('editor-form');
    const formTitulo = $('form-titulo');
    const documentoId = $('documento-id');
    const formTituloInput = $('form-titulo-input');
    const formDescripcion = $('form-descripcion');
    const formArchivoUrl = $('form-archivo-url');
    const formCategoria = $('form-categoria');
    const formCarrera = $('form-carrera');
    const formAcceso = $('form-acceso');
    const btnGuardar = $('btn-guardar');
    const btnCancelar = $('btn-cancelar');
    const btnNuevo = $('btn-nuevo-documento');
    const tablaDocumentos = $('tabla-documentos');
    const mensaje = $('admin-mensaje');

    /* ─── Message helper ────────────────────────── */
    function mostrarMensaje(texto, tipo) {
      mensaje.textContent = texto;
      mensaje.className = 'admin-mensaje ' + tipo;
      setTimeout(() => {
        mensaje.className = 'admin-mensaje';
        mensaje.textContent = '';
      }, 3000);
    }

    /* ─── Load documents ────────────────────────── */
    async function cargarDocumentos() {
      try {
        const { data, error } = await supabase
          .from('documentos')
          .select('*')
          .order('creado_en', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          tablaDocumentos.innerHTML = '<tr><td colspan="5" class="empty-state">No hay documentos aún</td></tr>';
          return;
        }

        tablaDocumentos.innerHTML = data.map(d => {
          const titulo = sanitizar(d.titulo.length > 60 ? d.titulo.slice(0, 60) + '...' : d.titulo);
          const categoria = `<span class="badge badge-categoria">${sanitizar(d.categoria)}</span>`;
          const carrera = d.carrera ? sanitizar(d.carrera) : '—';
          const badgeAcceso = {
            publico: '<span class="badge badge-publicado">Público</span>',
            estudiante: '<span class="badge badge-activo">Estudiante</span>',
            personal: '<span class="badge badge-advertencia">Personal</span>',
            admin: '<span class="badge badge-inactivo">Admin</span>'
          }[d.acceso_minimo] || sanitizar(d.acceso_minimo);
          return `<tr>
            <td>${titulo}</td>
            <td>${categoria}</td>
            <td>${carrera}</td>
            <td>${badgeAcceso}</td>
            <td>
              <button class="btn btn-sm btn-primario btn-editar" data-id="${d.id}">Editar</button>
              <button class="btn btn-sm btn-peligro btn-eliminar" data-id="${d.id}">Eliminar</button>
            </td>
          </tr>`;
        }).join('');
      } catch (err) {
        console.error('Error al cargar documentos:', err);
        tablaDocumentos.innerHTML = '<tr><td colspan="5" class="empty-state error">Error al cargar los datos: ' + err.message + '</td></tr>';
      }
    }

    /* ─── Show / Hide form ──────────────────────── */
    function mostrarFormulario() {
      editorForm.style.display = 'block';
    }

    function ocultarFormulario() {
      editorForm.style.display = 'none';
      formTitulo.textContent = 'Crear Documento';
      documentoId.value = '';
      formTituloInput.value = '';
      formDescripcion.value = '';
      formArchivoUrl.value = '';
      formCategoria.value = '';
      formCarrera.value = '';
      formAcceso.value = 'estudiante';
      modoEdicion = false;
      documentoEditandoId = null;
    }

    /* ─── Nuevo documento ───────────────────────── */
    btnNuevo.addEventListener('click', () => {
      ocultarFormulario();
      modoEdicion = false;
      mostrarFormulario();
    });

    /* ─── Cancelar ──────────────────────────────── */
    btnCancelar.addEventListener('click', ocultarFormulario);

    /* ─── Editar (event delegation) ─────────────── */
    tablaDocumentos.addEventListener('click', async (e) => {
      const btnEditar = e.target.closest('.btn-editar');
      if (!btnEditar) return;

      const id = btnEditar.dataset.id;
      try {
        const { data, error } = await supabase
          .from('documentos')
          .select('*')
          .eq('id', id)
          .single();

        if (error) throw error;
        if (!data) throw new Error('Documento no encontrado');

        documentoId.value = data.id;
        formTituloInput.value = data.titulo || '';
        formDescripcion.value = data.descripcion || '';
        formArchivoUrl.value = data.archivo_url || '';
        formCategoria.value = data.categoria || '';
        formCarrera.value = data.carrera || '';
        formAcceso.value = data.acceso_minimo || 'estudiante';
        modoEdicion = true;
        documentoEditandoId = data.id;
        formTitulo.textContent = 'Editar Documento';
        mostrarFormulario();
      } catch (err) {
        console.error('Error al cargar documento:', err);
        mostrarMensaje('Error al cargar el documento: ' + err.message, 'error');
      }
    });

    /* ─── Guardar ───────────────────────────────── */
    btnGuardar.addEventListener('click', async () => {
      try {
        const titulo = formTituloInput.value.trim();
        const descripcion = formDescripcion.value.trim();
        const archivo_url = formArchivoUrl.value.trim();
        const categoria = formCategoria.value.trim();
        const carrera = formCarrera.value.trim();
        const acceso_minimo = formAcceso.value;

        if (!titulo) {
          mostrarMensaje('El título es obligatorio', 'error');
          return;
        }
        if (!archivo_url) {
          mostrarMensaje('La URL del archivo es obligatoria', 'error');
          return;
        }
        if (!categoria) {
          mostrarMensaje('La categoría es obligatoria', 'error');
          return;
        }

        const { data: { user } } = await supabase.auth.getUser();

        if (!modoEdicion) {
          const { error } = await supabase
            .from('documentos')
            .insert({
              titulo,
              descripcion,
              archivo_url,
              categoria,
              carrera,
              acceso_minimo,
              subido_por: user.id
            })
            .select()
            .single();

          if (error) throw error;
          mostrarMensaje('Documento creado exitosamente', 'exito');
        } else {
          const { error } = await supabase
            .from('documentos')
            .update({
              titulo,
              descripcion,
              archivo_url,
              categoria,
              carrera,
              acceso_minimo
            })
            .eq('id', documentoEditandoId);

          if (error) throw error;
          mostrarMensaje('Documento actualizado exitosamente', 'exito');
        }

        ocultarFormulario();
        await cargarDocumentos();
      } catch (err) {
        console.error('Error al guardar documento:', err);
        mostrarMensaje('Error al guardar el documento: ' + err.message, 'error');
      }
    });

    /* ─── Eliminar (event delegation) ───────────── */
    tablaDocumentos.addEventListener('click', async (e) => {
      const btnEliminar = e.target.closest('.btn-eliminar');
      if (!btnEliminar) return;

      const id = btnEliminar.dataset.id;
      if (!confirm('¿Seguro que deseas eliminar este documento?')) return;

      try {
        const { error } = await supabase
          .from('documentos')
          .delete()
          .eq('id', id);

        if (error) throw error;
        mostrarMensaje('Documento eliminado exitosamente', 'exito');
        await cargarDocumentos();
      } catch (err) {
        console.error('Error al eliminar documento:', err);
        mostrarMensaje('Error al eliminar el documento: ' + err.message, 'error');
      }
    });

    /* ─── Init ──────────────────────────────────── */
    await cargarDocumentos();
  </script>
</body>

</html>
